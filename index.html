<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/pwa/manifest.json">
<title>Kiosk Portal</title>

<style>
    html, body {
        margin: 0;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #FEC426;
        color: white;
    }

    body {
        display: flex;
        flex-direction: column;
    }

    header {
        text-align: center;
        padding: 20px;
        font-size: 30px;
        font-weight: bold;
        background: #FFFFFF;
        color: black;
    }

    .header-logo {
        height: 150px;
        margin-bottom: 10px;
        object-fit: contain;
    }

    .header-text {
        font-size: 30px;
        font-weight: bold;
    }

/* Only one of the Grid types should be uncommented at a time */    
/* Autofit Grid -  1 Row
    .grid {
        flex: 1;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 1fr;
        gap: 24px;
        padding: 24px;
        box-sizing: border-box;
        justify-items: center;
        align-items: center;
    }
*/
/* Autofit Grid - Rows dynamic based off 250px */
    .grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 24px;
        padding: 24px;
        box-sizing: border-box;
        justify-items: center;
        align-items: center;
    }

    .tile {
        width: 100%;
        aspect-ratio: 1 / 1;
        max-width: 350px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        color: white;
        background: #000000;
        border-radius: 18px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.45);
        font-size: clamp(22px, 2.5vw, 36px);
        font-weight: bold;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
    }
    
    .tile-text {
        min-height: 2.5em;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .tile:active {
        transform: scale(0.98);
    }

    .logo {
        width: clamp(100px, 12vw, 200px);
        height: clamp(100px, 12vw, 200px);
        object-fit: contain;
        background: white;
        border-radius: 16px;
        padding: 12px;
        margin-bottom: 20px;
        box-sizing: border-box;
    }

    footer {
        text-align: center;
        padding: 12px;
        font-size: 16px;
        background: #FFFFFF;
        color: black;
    }
</style>
</head>

<body>

<header>
    <img src="logos/TabletKioskLogo.png" class="header-logo">
    <div class="header-text">Start Your Financial Journey Today!</div>
</header>

<div class="grid">

    <a class="tile" href="https://apply.crossroadscu.ca/" target="_self">
        <img class="logo" src="logos/apply.png">
        <div class="tile-text">Open An Account</div>
    </a>

    <a class="tile" href="https://www.crossroadscu.ca/en" target="_self">
        <img class="logo" src="logos/website.png">
        <div class="tile-text">Crossroads Website</div>
    </a>

    <a class="tile" href="https://online.crossroadscu.ca/" target="_self">
        <img class="logo" src="logos/online.png">
        <div class="tile-text">Online Banking</div>
    </a>

    <a class="tile" href="https://xrds.ca/MemberSurveyv2" target="_self">
        <img class="logo" src="logos/membersurvey.png">
        <div class="tile-text">Member Survey</div>
    </a>

</div>

<footer>
    This is a shared device. For your security, logout of all sessions after use.
</footer>

<script> 
    if ('serviceWorker' in navigator) { 
        navigator.serviceWorker.register('/sw.js'); 
    } 
</script>
    
</body>
</html>
